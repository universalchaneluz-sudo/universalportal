<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Portal - Блог</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #3498db; --dark: #2c3e50; --bg: #f2f4f7; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); margin: 0; color: #333; }

        /* Тест режими хабари */
        .test-banner { background: #e74c3c; color: white; text-align: center; padding: 5px 0; font-size: 14px; font-weight: bold; }

        header { background: #fff; padding: 15px; border-bottom: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area img { border-radius: 50%; border: 2px solid var(--blue); }
        .logo-area h1 { margin: 0; font-size: 20px; color: var(--dark); text-transform: uppercase; }

        .home-btn { background: var(--blue); color: white; text-decoration: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .home-btn:hover { background: var(--dark); transform: translateY(-2px); }

        .main-wrapper { max-width: 1200px; margin: 20px auto; display: flex; gap: 20px; padding: 0 15px; }

        /* Чап томон - Асосий мақола */
        .content-area { flex: 3; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .post-image { width: 100%; max-height: 450px; object-fit: cover; border-radius: 5px; margin-bottom: 20px; display: none; }
        .post-title { font-size: 28px; margin-bottom: 15px; color: var(--dark); line-height: 1.3; }
        .post-meta { font-size: 13px; color: #888; margin-bottom: 20px; border-bottom: 1px dotted #ccc; padding-bottom: 10px; }
        .post-body { font-size: 18px; line-height: 1.8; white-space: pre-wrap; color: #444; }

        /* Ўнг томон - Sidebar */
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .side-card { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 20px; }
        .side-card h3 { font-size: 16px; margin-top: 0; border-bottom: 2px solid var(--blue); padding-bottom: 5px; color: var(--dark); }
        
        .side-item { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .side-item a { text-decoration: none; color: var(--dark); font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; line-height: 1.2; }
        .side-item a:hover { color: var(--blue); }
        .side-item p { font-size: 12px; color: #666; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { order: 2; }
            .side-card { position: static; }
        }
    </style>
</head>
<body>

    <div class="test-banner"><i class="fas fa-exclamation-triangle"></i> САЙТ ТЕСТ РЕЖИМИДА ИШЛАМОҚДА!</div>

    <header>
        <div class="nav-container">
            <div class="logo-area">
                <img src="logo.jpg" alt="Logo" width="50" height="50">
                <h1>UNIVERSAL PORTAL</h1>
            </div>
            <a href="index.html" class="home-btn"><i class="fas fa-home"></i> АСОСИЙ САҲИФА</a>
        </div>
    </header>

    <div class="main-wrapper">
        <main class="content-area">
            <div id="loader" style="text-align:center; padding: 40px;"><i class="fas fa-spinner fa-spin fa-2x"></i><br>Юкланмоқда...</div>
            
            <article id="mainPost" style="display:none;">
                <img id="postImg" src="" class="post-image">
                <h2 id="postTitle" class="post-title"></h2>
                <div class="post-meta">
                    <i class="far fa-calendar-alt"></i> <span id="postTime"></span> | 
                    <i class="far fa-folder"></i> <span id="postCat"></span>
                </div>
                <div id="postBody" class="post-body"></div>
            </article>
        </main>

        <aside class="sidebar">
            <div class="side-card">
                <h3>Сўнгги мақолалар</h3>
                <div id="sideList">Юкланмоқда...</div>
            </div>
        </aside>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, limitToLast, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
            databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "universal-portal-108b7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        // 1. Асосий мақолани юклаш
        if (postId) {
            onValue(ref(db, 'all_posts/' + postId), (s) => {
                const data = s.val();
                if (data) {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('mainPost').style.display = 'block';
                    document.getElementById('postTitle').innerText = data.title;
                    document.getElementById('postBody').innerText = data.content;
                    document.getElementById('postCat').innerText = data.category;
                    document.getElementById('postTime').innerText = data.time;
                    const img = document.getElementById('postImg');
                    if(data.image) {
                        img.src = data.image;
                        img.style.display = 'block';
                    } else {
                        img.style.display = 'none';
                    }
                    // Саҳифа номини мақола номига ўзгартириш
                    document.title = data.title + " - Universal Portal";
                }
            });
        } else {
            // Агар ID бўлмаса, бош саҳифага юбориш
            window.location.href = "index.html";
        }

        // 2. Sidebar учун рўйхатни юклаш
        const recentQuery = query(ref(db, 'all_posts'), limitToLast(12));
        onValue(recentQuery, (s) => {
            const listDiv = document.getElementById('sideList');
            listDiv.innerHTML = "";
            const data = s.val();
            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const item = data[id];
                    const div = document.createElement('div');
                    div.className = 'side-item';
                    div.innerHTML = `
                        <a href="post.html?id=${id}">${item.title}</a>
                        <p>${item.content.substring(0, 80)}...</p>
                    `;
                    listDiv.appendChild(div);
                });
            } else {
                listDiv.innerHTML = "Мақолалар йўқ.";
            }
        });
    </script>
</body>
</html>
