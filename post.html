<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог - Universal Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #3498db; --dark: #2c3e50; --bg: #f2f4f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        header { background: #fff; padding: 15px; border-bottom: 1px solid #ddd; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .home-btn { background: var(--blue); color: white; text-decoration: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; }
        
        .main-wrapper { max-width: 900px; margin: 30px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .post-image { width: 100%; max-height: 500px; object-fit: cover; border-radius: 8px; margin-bottom: 20px; }
        
        /* Мақола ичидаги видео стили */
        .post-video-container { margin: 25px 0; background: #000; border-radius: 10px; overflow: hidden; width: 100%; }
        .post-video-container iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
        
        .post-title { font-size: 32px; color: var(--dark); margin-bottom: 10px; }
        .post-meta { color: #888; font-size: 14px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .post-body { font-size: 18px; line-height: 1.8; color: #333; white-space: pre-wrap; }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <h1>UNIVERSAL PORTAL</h1>
        <a href="index.html" class="home-btn"><i class="fas fa-home"></i> АСОСИЙ САҲИФА</a>
    </div>
</header>

<div class="main-wrapper">
    <div id="loader" style="text-align:center;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
    
    <article id="mainPost" style="display:none;">
        <img id="postImg" class="post-image" style="display:none;">
        <h2 id="postTitle" class="post-title"></h2>
        <div class="post-meta">
            <i class="far fa-calendar-alt"></i> <span id="postTime"></span> | 
            <i class="far fa-folder"></i> <span id="postCat"></span>
        </div>

        <div id="videoContainer" class="post-video-container" style="display:none;"></div>

        <div id="postBody" class="post-body"></div>
    </article>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
        databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal-portal-108b7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    if (postId) {
        onValue(ref(db, 'all_posts/' + postId), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('mainPost').style.display = 'block';
                
                document.getElementById('postTitle').innerText = data.title;
                document.getElementById('postBody').innerText = data.content;
                document.getElementById('postCat').innerText = data.category;
                document.getElementById('postTime').innerText = data.time;

                // Расм бўлса чиқарамиз
                if (data.image) {
                    const img = document.getElementById('postImg');
                    img.src = data.image;
                    img.style.display = 'block';
                }

                // Видео бўлса чиқарамиз
                if (data.video) {
                    const videoDiv = document.getElementById('videoContainer');
                    videoDiv.innerHTML = data.video;
                    videoDiv.style.display = 'block';
                }

                document.title = data.title;
            }
        });
    } else {
        window.location.href = "index.html";
    }
</script>
</body>
</html>
