<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Биз билан боғланиш - Universal Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        nav { background: #2c3e50; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        nav a:hover { color: #27ae60; }
        .contact-container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; gap: 30px; }
        .contact-info { flex: 1; border-right: 1px solid #eee; padding-right: 20px; }
        .contact-form { flex: 1.5; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #219150; }
        #status-msg { text-align: center; margin-top: 15px; font-weight: bold; display: none; padding: 10px; border-radius: 5px; }
        @media (max-width: 768px) { .contact-container { flex-direction: column; margin: 20px; } .contact-info { border-right: none; border-bottom: 1px solid #eee; margin-bottom: 20px; } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Асосий</a>
        <a href="hlp.html">Маслаҳатлар</a>
        <a href="cock.html">Ошхона</a>
        <a href="med.html">Табобат</a>
        <a href="news.html">Янгиликлар</a>
    </nav>

    <div class="contact-container">
        <div class="contact-info">
            <h2>Алоқа</h2>
            <p>Савол ва таклифларингизни йўлланг. Биз тез орада жавоб берамиз.</p>
            <p><i class="fas fa-envelope"></i> info@universal-portal.uz</p>
            <p><i class="fas fa-map-marker-alt"></i> Наманган шаҳри</p>
        </div>

        <div class="contact-form">
            <form id="contact-form">
                <input type="text" name="user_name" placeholder="Исм-шарифингиз" required>
                <input type="email" name="user_email" placeholder="Электрон почтангиз" required>
                <textarea name="message" rows="5" placeholder="Хабарингиз матни..." required></textarea>
                <button type="submit" id="send-btn">ЮБОРИШ <i class="fas fa-paper-plane"></i></button>
            </form>
            <div id="status-msg"></div>
        </div>
    </div>

    <script type="text/javascript">
        (function() {
            // Сизнинг Public Key жойланди
            emailjs.init("EmjeqopCgeeZoZdMR"); 
        })();

        document.getElementById('contact-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const btn = document.getElementById('send-btn');
            const status = document.getElementById('status-msg');

            btn.disabled = true;
            btn.innerHTML = "Юборилмоқда...";

            // Service ва Template ID-лар жойланди
            emailjs.sendForm('service_5q8ltmp', 'template_390cxcc', this)
                .then(function() {
                    status.style.display = "block";
                    status.style.backgroundColor = "#e8f5e9";
                    status.style.color = "#27ae60";
                    status.innerHTML = "✅ Хабарингиз муваффақиятли юборилди!";
                    document.getElementById('contact-form').reset();
                    btn.disabled = false;
                    btn.innerHTML = "ЮБОРИШ <i class='fas fa-paper-plane'></i>";
                }, function(error) {
                    status.style.display = "block";
                    status.style.backgroundColor = "#ffebee";
                    status.style.color = "#e74c3c";
                    status.innerHTML = "❌ Хатолик юз берди. Илтимос, қайта уриниб кўринг.";
                    console.log("Error:", error);
                    btn.disabled = false;
                    btn.innerHTML = "ЮБОРИШ <i class='fas fa-paper-plane'></i>";
                });
        });
    </script>
</body>
</html>
