<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бўлим саҳифаси</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ТЕЛЕФОНЛАР УЧУН МАХСУС СОЗЛАМА */
@media (max-width: 768px) {
    /* 1. Контейнерни кенгайтирамиз */
    .container {
        flex-direction: column; /* Sidebar-ни пастга туширади */
        padding: 10px;
    }

    /* 2. Асосий мазмун ва Sidebar 100% кенгликда бўлади */
    .main-content, .sidebar {
        width: 100% !important;
        flex: none;
    }

    /* 3. Расмларни мослаштириш */
    .post-card img {
        height: auto; /* Расм сиқилиб қолмайди */
    }

    /* 4. Навигация (Меню) - Тугмаларни каттароқ қилиш */
    nav {
        flex-wrap: wrap; /* Меню сиғмаса пастга тушади */
    }
    nav a {
        flex: 1 1 45%; /* Битта қаторда 2 тадан меню тугмаси */
        text-align: center;
        font-size: 14px;
        padding: 10px 5px;
    }

    /* 5. Матнларни ўқишга қулай қилиш */
    .post-info h2 {
        font-size: 20px;
    }
    .post-info p {
        font-size: 16px;
    }
}
        /* Сизга аввал берган чиройли дизайним стилларини шу ерга қўйинг */
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; }
        .main-container { max-width: 1100px; margin: 20px auto; display: flex; gap: 20px; padding: 20px; }
        .content { flex: 7; }
        .sidebar { flex: 3; background: white; padding: 20px; border-radius: 10px; height: fit-content; }
        .post-card { background: white; margin-bottom: 25px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .post-card img { width: 100%; height: auto; }
        .post-info { padding: 20px; }
        .video-box iframe { width: 100%; height: 300px; border: none; border-radius: 8px; }
        nav { background: #2c3e50; padding: 15px; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Асосий</a>
        <a href="cock.html">Кулинария</a>
        <a href="med.html">Табобат</a>
        <a href="yumor.html">Ҳангомалар</a>
        <a href="news.html">Янгиликлар</a>
    </nav>

    <div class="main-container">
        <!-- Мақолалар шу ерга тушади -->
        <div class="content" id="post-display-area"></div>

        <!-- Ўнг томон -->
        <div class="sidebar">
            <h3>Бўлимдаги хабарлар</h3>
            <ul id="sidebar-links" style="list-style:none; padding:0;"></ul>
        </div>
    </div>

    <!-- Кўприк скриптини улаймиз -->
     <script type="module" src="bridge.js"></script>
    <script src="bridge.js"></script>
</body>
</html>
