<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мақолани ўқиш - Universal Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        .container { max-width: 1200px; margin: 30px auto; display: flex; gap: 40px; padding: 0 20px; }
        
        /* ЧАП ТОМОН - ТЎЛИҚ МАТН */
        .article-side { flex: 2.5; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); }
        .back-link { text-decoration: none; color: #3498db; font-weight: bold; margin-bottom: 20px; display: block; }
        .article-title { font-size: 36px; line-height: 1.2; margin: 20px 0; color: #2c3e50; }
        .article-img { width: 100%; border-radius: 15px; margin-bottom: 30px; }
        .article-content { font-size: 19px; line-height: 1.8; white-space: pre-wrap; color: #444; }
        
        /* ЎНГ ТОМОН - БОШҚА МАҚОЛАЛАР */
        .sidebar { flex: 1; position: sticky; top: 20px; height: fit-content; }
        .sidebar-box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); }
        .sidebar-title { border-bottom: 3px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; font-size: 18px; }
        .side-post { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .side-post a { text-decoration: none; color: #2c3e50; font-weight: 600; font-size: 15px; display: block; transition: 0.2s; }
        .side-post a:hover { color: #3498db; }
        .side-post small { color: #999; font-size: 12px; }

        @media (max-width: 900px) { .container { flex-direction: column; } .sidebar { position: static; } }
    </style>
</head>
<body>

<div class="container">
    <div class="article-side" id="full-article">
        <div style="text-align:center; padding:100px;"><i class="fas fa-spinner fa-spin fa-3x"></i></div>
    </div>

    <div class="sidebar">
        <div class="sidebar-box">
            <h3 class="sidebar-title">Сўнгги янгиликлар</h3>
            <div id="side-links"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
        databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal-portal-108b7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // URL дан мақола ID сини олиш (index.html юборган ID)
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    // 1. Тўлиқ мақолани юклаш
    if (postId) {
        onValue(ref(db, 'all_posts/' + postId), (snapshot) => {
            const post = snapshot.val();
            const container = document.getElementById('full-article');
            if (post) {
                container.innerHTML = `
                    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Асосий саҳифага қайтиш</a>
                    <h1 class="article-title">${post.title}</h1>
                    <p style="color:#999"><i class="far fa-calendar-alt"></i> ${post.time} | Бўлим: ${post.category}</p>
                    ${post.image ? `<img src="${post.image}" class="article-img">` : ""}
                    <div class="article-content">${post.content}</div>
                    ${post.video ? `<div style="margin-top:30px; border-top:1px solid #eee; padding-top:20px;">${post.video}</div>` : ""}
                `;
                document.title = post.title + " - Universal Portal";
            } else {
                container.innerHTML = "<h2>Мақола топилмади.</h2>";
            }
        });
    }

    // 2. Ўнг томон учун кичик линкларни юклаш
    onValue(ref(db, 'all_posts'), (snapshot) => {
        const data = snapshot.val();
        const sideBox = document.getElementById('side-links');
        sideBox.innerHTML = "";
        if (data) {
            Object.keys(data).reverse().slice(0, 8).forEach(key => {
                sideBox.innerHTML += `
                    <div class="side-post">
                        <a href="post.html?id=${key}">${data[key].title}</a>
                        <small>${data[key].time}</small>
                    </div>
                `;
            });
        }
    });
</script>
</body>
</html>
