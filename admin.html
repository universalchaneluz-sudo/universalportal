<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Portal - Шахсий Кабинет</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; }
        #login-section { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        
        #admin-main-content { display: none; max-width: 900px; margin: 30px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        
        .profile-header { background: #3498db; color: white; padding: 20px; border-radius: 15px; display: flex; align-items: center; margin-bottom: 30px; }
        .avatar { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-right: 20px; border: 2px solid white; }
        
        .notice-section { background: #fff4e5; border: 2px dashed #ff9800; padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        
        input, textarea, select { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; }
        input:focus { border-color: #3498db; box-shadow: 0 0 10px rgba(52,152,219,0.1); }
        
        button { border: none; cursor: pointer; font-weight: bold; border-radius: 12px; transition: 0.3s; }
        .btn-main { width: 100%; background: #3498db; color: white; padding: 15px; font-size: 18px; }
        .btn-main:hover { background: #2980b9; }
        .btn-notice { background: #ff9800; color: white; padding: 10px 20px; }
        
        .upload-area { border: 2px dashed #3498db; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; background: #f9f9f9; cursor: pointer; }
        .upload-area:hover { background: #f0f7ff; }
        #img-preview { max-width: 150px; border-radius: 8px; margin-top: 10px; display: none; margin-left: auto; margin-right: auto; }

        .post-item { background: #fcfcfc; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-edit { background: #f1c40f; color: white; padding: 8px 12px; margin-right: 5px; }
        .btn-delete { background: #e74c3c; color: white; padding: 8px 12px; }
        
        .nav-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-top { background: #2ecc71; color: white; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-card">
            <i class="fas fa-shield-alt" style="font-size: 60px; color: #3498db; margin-bottom: 20px;"></i>
            <h2>Админ Кабинет</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Парол">
            <button class="btn-main" id="loginBtn">КИРИШ</button>
            <a href="index.html">Асосий сахифага</a>
        </div>
    </div>

    <div id="admin-main-content">
        <div class="profile-header">
            <div class="avatar"><i class="fas fa-user-tie"></i></div>
            <div>
                <h2 style="margin:0">Зохиджон Носирович</h2>
                <small>Бош Администратор | Universal Portal</small>
            </div>
        </div>

        <div class="nav-btns">
            <a href="index.html" class="btn-top"><i class="fas fa-home"></i> Саҳифага қайтиш</a>
            <button onclick="location.reload()" class="btn-top" style="background:#3498db"><i class="fas fa-sync"></i> Янгилаш</button>
            <button id="logoutBtn" class="btn-top" style="background:#e74c3c"><i class="fas fa-sign-out-alt"></i> Чиқиш</button>
        </div>

        <div class="notice-section">
            <label><b><i class="fas fa-bullhorn"></i> Тезкор эълон:</b></label>
            <div style="display:flex; gap:10px; margin-top:10px">
                <input type="text" id="qNotice" style="margin:0" placeholder="Муҳим хабар ёзинг...">
                <button class="btn-notice" id="sendNBtn">ЮБОРИШ</button>
            </div>
        </div>

        <h3 id="form-title">Янги мақола қўшиш</h3>
        <input type="hidden" id="edit-id">
        
        <select id="cat">
            <option value="home">Асосий саҳифа</option>
            <option value="news">Янгиликлар</option>
            <option value="med">Табобат</option>
            <option value="stories">Ҳикоялар</option>
            <option value="yumor">Ҳангомалар</option>
        </select>

        <input type="text" id="title" placeholder="Сарлавҳа">

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-cloud-upload-alt" style="font-size: 30px; color: #3498db;"></i>
            <p style="margin: 5px 0; font-size: 14px; color: #666;">Компьютердан расм юклаш учун босинг</p>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <img id="img-preview" alt="Превью">
        </div>
        
        <input type="text" id="img" placeholder="Ёки расм линкини (URL) киритинг">
        
        <textarea id="txt" rows="6" placeholder="Мақола матни..."></textarea>
        <input type="text" id="vid" placeholder="Видео Iframe (ихтиёрий)">
        <button class="btn-main" id="pubBtn">НАШР ҚИЛИШ</button>

        <div style="margin-top:40px">
            <h3>Бошқариш (Рўйхат)</h3>
            <div id="pContainer">Юкланмоқда...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
            authDomain: "universal-portal-108b7.firebaseapp.com",
            databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "universal-portal-108b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Расмни компьютердан танлаганда уни ўқиш
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('img').value = event.target.result; // Расмни базага юбориш учун матнга айлантириш
                    const preview = document.getElementById('img-preview');
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("Хато: " + e.message));
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, u => {
            if(u) {
                document.getElementById('login-section').style.display='none';
                document.getElementById('admin-main-content').style.display='block';
                loadP();
            }
        });

        document.getElementById('sendNBtn').onclick = async () => {
            await set(ref(db, 'site_notice'), { text: qNotice.value });
            alert("Эълон янгиланди!");
        };

        document.getElementById('pubBtn').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                title: title.value, 
                content: txt.value,
                category: cat.value, 
                image: img.value, 
                video: vid.value,
                time: new Date().toLocaleString()
            };

            if(!data.title || !data.content) return alert("Сарлавҳа ва матнни ёзинг!");

            if(id) {
                await update(ref(db, 'all_posts/'+id), data);
                alert("Мақола янгиланди!");
            } else {
                await push(ref(db, 'all_posts'), data);
                alert("Мақола асосий саҳифага юборилди!");
            }
            resetForm();
        };

        function loadP() {
            onValue(ref(db, 'all_posts'), s => {
                const c = document.getElementById('pContainer'); 
                c.innerHTML = "";
                const d = s.val();
                if(d) {
                    Object.keys(d).reverse().forEach(id => {
                        const div = document.createElement('div'); 
                        div.className = 'post-item';
                        div.innerHTML = `
                            <div><b>${d[id].title}</b> <small style="color:#999">(${d[id].category})</small></div>
                            <div>
                                <button class="btn-edit" onclick="editP('${id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn-delete" onclick="delP('${id}')"><i class="fas fa-trash"></i></button>
                            </div>`;
                        c.appendChild(div);
                    });
                } else {
                    c.innerHTML = "Мақолалар йўқ.";
                }
            });
        }

        window.delP = async (id) => { 
            if(confirm("Ростан ҳам ўчирилсинми?")) {
                await remove(ref(db, 'all_posts/'+id)); 
            }
        };

        window.editP = (id) => {
            onValue(ref(db, 'all_posts/'+id), s => {
                const p = s.val();
                if(p) {
                    document.getElementById('edit-id').value = id;
                    document.getElementById('title').value = p.title; 
                    document.getElementById('txt').value = p.content;
                    document.getElementById('cat').value = p.category; 
                    document.getElementById('img').value = p.image || ""; 
                    document.getElementById('vid').value = p.video || "";
                    document.getElementById('form-title').innerText = "Мақолани таҳрирлаш";
                    document.getElementById('pubBtn').innerText = "САҚЛАШ";
                    
                    if(p.image && p.image.startsWith('data:image')) {
                        const preview = document.getElementById('img-preview');
                        preview.src = p.image;
                        preview.style.display = 'block';
                    }
                    window.scrollTo({top: 0, behavior: 'smooth'});
                }
            }, {onlyOnce: true});
        };

        function resetForm() {
            document.getElementById('edit-id').value = "";
            document.getElementById('title').value = "";
            document.getElementById('txt').value = "";
            document.getElementById('img').value = "";
            document.getElementById('vid').value = "";
            document.getElementById('img-preview').style.display = 'none';
            document.getElementById('form-title').innerText = "Янги мақола қўшиш";
            document.getElementById('pubBtn').innerText = "НАШР ҚИЛИШ";
        }
    </script>
</body>
</html>
