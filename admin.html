<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Media | Фильм Портал</title>
    <!-- Firebase V8 SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #16161e;
            --gold: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            --gold-solid: #f6d365;
            --text: #f1f5f9;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        header { background: var(--card); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(246, 211, 101, 0.2); position: sticky; top: 0; z-index: 100; }
        
        .logo-container { display: flex; align-items: center; text-decoration: none; gap: 10px; }
        .logo-icon { width: 35px; height: 35px; background: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #16161e; font-weight: bold; font-size: 22px; }
        .logo-text { font-size: 24px; font-weight: bold; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; text-transform: uppercase; }

        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; display: inline-block; text-decoration: none; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-danger { background: #ef4444; color: white; }

        .admin-panel { display: none; max-width: 700px; margin: 20px auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(246, 211, 101, 0.3); }
        .input-group { margin-bottom: 15px; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; background: #000; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }

        .container { padding: 20px 5%; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .movie-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        
        .video-container { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .movie-info { padding: 15px; text-align: center; }
        .movie-info h3 { color: var(--gold-solid); margin: 0 0 10px 0; font-size: 1.1rem; }
        
        .stats { display: flex; justify-content: space-around; padding: 10px; background: rgba(0,0,0,0.3); font-size: 13px; color: #94a3b8; border-top: 1px solid rgba(255,255,255,0.05); }
        .stats span { cursor: pointer; transition: 0.3s; padding: 5px 10px; border-radius: 5px; }
        .stats span:hover { background: rgba(255,255,255,0.1); color: var(--gold-solid); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 40px; border-radius: 25px; border: 2px solid var(--gold-solid); width: 300px; text-align: center; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo-container">
        <div class="logo-icon">U</div>
        <div class="logo-text">UNIVERSAL MEDIA</div>
    </a>
    <div id="navBtns">
        <button class="btn btn-gold" onclick="openLogin()">Шахсий кабинет</button>
    </div>
</header>

<div id="adminPanel" class="admin-panel">
    <h2 style="color: var(--gold-solid); text-align: center;" id="formTitle">Фильм қўшиш</h2>
    <input type="hidden" id="editKey">
    <div class="input-group"><input type="text" id="mName" placeholder="Фильм номи"></div>
    <div class="input-group"><textarea id="mEmbed" rows="4" placeholder="<iframe> кодни тўлиқ жойланг"></textarea></div>
    <div class="input-group">
        <select id="mGenre">
            <option value="Боевик">Боевик</option>
            <option value="Детектив">Детектив</option>
            <option value="Триллер">Триллер</option>
            <option value="Ўзбек фильм">Ўзбек фильм</option>
            <option value="Комедия">Комедия</option>
            <option value="Фантастика">Фантастика</option>
            <option value="Ретро">Ретро</option>
            <option value="Ужас">Ужас</option>
            <option value="Ўзбек ретро">Ўзбек ретро</option>
            <option value="Ўзбек тилига таржима">Ўзбек тилида таржима фильмлар</option>
        </select>
    </div>
    <button class="btn btn-gold" style="width: 100%;" onclick="saveToFirebase()">Серверга сақлаш</button>
    <button class="btn" style="width: 100%; margin-top: 10px; color:#aaa; background:#333;" onclick="closeAdmin()">Ёпиш</button>
</div>

<div class="container">
    <div class="movie-grid" id="movieGrid"></div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--gold-solid);">Админ Кириш</h2>
        <input type="password" id="passInput" style="width:100%; padding:12px; margin:20px 0; background:#000; color:white; border:1px solid var(--gold-solid); border-radius:8px; text-align:center;" placeholder="****">
        <button class="btn btn-gold" style="width:100%;" onclick="checkAuth()">Кириш</button>
        <button class="btn" style="color:#666; margin-top:10px; background:none;" onclick="closeLogin()">Бекор қилиш</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAV9u_Go4bIuDlC-vM3rH1T9MwLGwe9H3I",
        authDomain: "universal-media-8f205.firebaseapp.com",
        databaseURL: "https://universal-media-8f205-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal-media-8f205",
        storageBucket: "universal-media-8f205.firebasestorage.app",
        messagingSenderId: "21945142340",
        appId: "1:21945142340:web:796e1d4e85566899b3c011"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let isAdmin = localStorage.getItem('isMovieAdmin') === 'true';

    if(isAdmin) {
        document.getElementById('navBtns').innerHTML = '<button class="btn btn-danger" onclick="logout()">Чиқиш</button>';
        document.getElementById('adminPanel').style.display = 'block';
    }

    // МАЪЛУМОТЛАРНИ ЧИҚАРИШ
    database.ref('movies').on('value', (snapshot) => {
        const movies = snapshot.val() || {};
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';

        Object.keys(movies).reverse().forEach(key => {
            const m = movies[key];
            let videoHtml = m.embed;
            if(videoHtml.startsWith('B64:')) {
                videoHtml = decodeURIComponent(atob(videoHtml.replace('B64:', '')));
            }

            const movieCard = document.createElement('div');
            movieCard.className = 'movie-card';
            movieCard.innerHTML = `
                <div class="video-container" id="vid-${key}"></div>
                <div class="movie-info">
                    <h3>${m.name}</h3>
                    <p style="color:#64748b; font-size:12px;">#${m.genre}</p>
                </div>
                <div class="stats">
                    <span title="Кўришлар сони">👁 ${m.views || 0}</span>
                    <span onclick="addLike('${key}')" title="Лайк босиш">❤️ ${m.likes || 0}</span>
                </div>
                ${isAdmin ? `
                    <div style="display:flex; gap:5px; padding:10px; border-top:1px solid #333;">
                        <button class="btn btn-gold" style="flex:1; font-size:11px;" onclick="prepareEdit('${key}')">Таҳрир</button>
                        <button class="btn btn-danger" style="flex:1; font-size:11px;" onclick="deleteMovie('${key}')">Ўчириш</button>
                    </div>
                ` : ''}
            `;
            grid.appendChild(movieCard);
            document.getElementById(`vid-${key}`).innerHTML = videoHtml;
            
            // Просмотрни ошириш (агар саҳифа янгиланса)
            increaseView(key);
        });
    });

    // Лайк қўшиш функцияси
    function addLike(key) {
        const likeRef = database.ref('movies/' + key + '/likes');
        likeRef.transaction((currentLikes) => {
            return (currentLikes || 0) + 1;
        });
    }

    // Просмотрни ошириш функцияси (саҳифа юкланганда 1 марта ишлайди)
    let viewedMovies = new Set();
    function increaseView(key) {
        if(!viewedMovies.has(key)) {
            const viewRef = database.ref('movies/' + key + '/views');
            viewRef.transaction((currentViews) => {
                return (currentViews || 0) + 1;
            });
            viewedMovies.add(key);
        }
    }

    function saveToFirebase() {
        const name = document.getElementById('mName').value;
        const embed = document.getElementById('mEmbed').value;
        const genre = document.getElementById('mGenre').value;
        const key = document.getElementById('editKey').value;

        if(!name || !embed) { alert("Маълумот тўлиқ эмас!"); return; }
        const safeEmbed = "B64:" + btoa(encodeURIComponent(embed));
        const movieData = { name, embed: safeEmbed, genre };

        if(key) {
            database.ref('movies/' + key).update(movieData).then(() => {
                alert("Янгиланди!");
                resetForm();
            });
        } else {
            database.ref('movies').push({
                ...movieData, views: 0, likes: 0
            }).then(() => {
                alert("Сақланди!");
                resetForm();
            });
        }
    }

    function prepareEdit(key) {
        database.ref('movies/' + key).once('value').then(s => {
            const m = s.val();
            document.getElementById('mName').value = m.name;
            let originalEmbed = m.embed;
            if(originalEmbed.startsWith('B64:')) {
                originalEmbed = decodeURIComponent(atob(originalEmbed.replace('B64:', '')));
            }
            document.getElementById('mEmbed').value = originalEmbed;
            document.getElementById('mGenre').value = m.genre;
            document.getElementById('editKey').value = key;
            document.getElementById('formTitle').innerText = "Таҳрирлаш";
            document.getElementById('adminPanel').style.display = 'block';
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    }

    function deleteMovie(key) {
        if(confirm("Ўчирилсинми?")) database.ref('movies/' + key).remove();
    }

    function checkAuth() {
        if(document.getElementById('passInput').value === "1975") {
            localStorage.setItem('isMovieAdmin', 'true');
            location.reload();
        } else { alert("Пароль хато!"); }
    }

    function resetForm() {
        document.getElementById('mName').value = "";
        document.getElementById('mEmbed').value = "";
        document.getElementById('editKey').value = "";
        document.getElementById('formTitle').innerText = "Фильм қўшиш";
        document.getElementById('adminPanel').style.display = isAdmin ? 'block' : 'none';
    }

    function openLogin() { 
        if(isAdmin) {
            let p = document.getElementById('adminPanel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        } else {
            document.getElementById('loginModal').style.display = 'flex'; 
        }
    }
    function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }
    function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
    function logout() { localStorage.removeItem('isMovieAdmin'); location.reload(); }
</script>
</body>
</html>
