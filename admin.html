<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел - Universal Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        #login-section { height: 90vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .admin-main { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; }
        
        .profile-card { background: #3498db; color: white; padding: 20px; border-radius: 15px; display: flex; align-items: center; margin-bottom: 20px; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; text-decoration: none; display: inline-block; }
        .btn-home { background: #2ecc71; } .btn-update { background: #3498db; } .btn-logout { background: #e74c3c; } .btn-save { background: #f39c12; } .btn-delete { background: #7f8c8d; }

        .section-box { border: 2px dashed #ddd; padding: 15px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        .section-title { font-weight: bold; margin-bottom: 10px; display: block; }
        
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="login-section">
    <div class="login-card">
        <i class="fas fa-shield-alt" style="font-size: 50px; color: #3498db; margin-bottom: 20px;"></i>
        <h2>Админ Кириш</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Парол">
        <button class="btn btn-update" style="width:100%" id="loginBtn">КИРИШ</button>
        <br><br>
        <a href="index.html" style="color:#666; text-decoration:none;">Асосий саҳифага қайтиш</a>
    </div>
</div>

<div id="admin-content" class="admin-main">
    <div class="profile-card">
        <i class="fas fa-user-circle" style="font-size: 50px; margin-right: 15px;"></i>
        <div>
            <h3 style="margin:0">Зоҳиджон Носирович</h3>
            <small>Бош Администратор | Universal Portal</small>
        </div>
    </div>

    <div class="btn-row">
        <a href="index.html" class="btn btn-home"><i class="fas fa-home"></i> Саҳифага қайтиш</a>
        <button class="btn btn-update" onclick="location.reload()"><i class="fas fa-sync"></i> Янгилаш</button>
        <button class="btn btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Чиқиш</button>
    </div>

    <div class="section-box" style="border-color: #ff9800;">
        <span class="section-title"><i class="fas fa-bullhorn"></i> Тезкор эълон (Матнли):</span>
        <input type="text" id="noticeText" placeholder="Муҳим хабарни ёзинг...">
        <div style="display:flex; gap:10px">
            <button class="btn btn-save" id="saveNotice">САҚЛАШ</button>
            <button class="btn btn-delete" id="delNotice">ЎЧИРИШ</button>
        </div>
    </div>

    <div class="section-box" style="border-color: #2ecc71;">
        <span class="section-title"><i class="fas fa-ad"></i> Реклама ва Эълонлар блоки (Расмли):</span>
        <input type="text" id="adImgUrl" placeholder="Реклама расми (URL)">
        <input type="text" id="adLinkUrl" placeholder="Реклама линки (https://...)">
        <div style="display:flex; gap:10px">
            <button class="btn btn-home" id="saveAd">РЕКЛАМАНИ ЖОЙЛАШ</button>
            <button class="btn btn-delete" id="delAd">ЎЧИРИШ</button>
        </div>
    </div>

    <h3>Янги мақола қўшиш</h3>
    <select id="cat">
        <option value="Янгиликлар">Янгиликлар</option>
        <option value="Табобат">Табобат</option>
        <option value="Кинотеатр">Кинотеатр</option>
        <option value="Клиплар">Мусиқий клиплар</option>
        <option value="Ҳикоялар">Ҳикоялар</option>
        <option value="Ҳангомалар">Ҳангомалар</option>
        <option value="Кулинария">Кулинария</option>
    </select>
    <input type="text" id="title" placeholder="Сарлавҳа">
    <input type="text" id="img" placeholder="Асосий расм URL">
    <textarea id="txt" rows="5" placeholder="Мақола матни..."></textarea>
    <button class="btn btn-update" style="width:100%" id="pubBtn">НАШР ҚИЛИШ</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
        databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "universal-portal-108b7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Кириш
    document.getElementById('loginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("Хато!"));
    };

    onAuthStateChanged(auth, u => {
        document.getElementById('login-section').style.display = u ? 'none' : 'flex';
        document.getElementById('admin-content').style.display = u ? 'block' : 'none';
    });

    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    // Эълонни бошқариш
    document.getElementById('saveNotice').onclick = () => set(ref(db, 'site_notice'), {text: noticeText.value});
    document.getElementById('delNotice').onclick = () => remove(ref(db, 'site_notice'));

    // Рекламани бошқариш
    document.getElementById('saveAd').onclick = () => set(ref(db, 'ads'), {img: adImgUrl.value, link: adLinkUrl.value});
    document.getElementById('delAd').onclick = () => remove(ref(db, 'ads'));

    // Мақола нашр қилиш
    document.getElementById('pubBtn').onclick = () => {
        const data = {
            title: title.value,
            image: img.value,
            category: cat.value,
            content: txt.value,
            time: new Date().toLocaleString()
        };
        push(ref(db, 'all_posts'), data).then(() => {
            alert("Нашр қилинди!");
            title.value = ""; img.value = ""; txt.value = "";
        });
    };
</script>
</body>
</html>
