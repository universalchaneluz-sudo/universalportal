<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Portal - Админ Панел & Кабинет</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #login-section { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        #admin-main-content { background: white; width: 95%; max-width: 1000px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: 20px; display: none; }
        
        /* Шахсий кабинет услуби */
        .admin-profile { display: flex; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd; }
        .admin-avatar { width: 60px; height: 60px; background: #3498db; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 15px; }
        
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #f4f4f4; padding-bottom: 15px; }
        
        /* Эълон юбориш блоки */
        .notice-box { background: #fff3cd; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px dashed #856404; }
        
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: #3498db; color: white; width: 100%; font-size: 18px; margin-top: 10px; }
        .btn-notice { background: #f39c12; color: white; width: auto; }
        .btn-home { background: #2ecc71; color: white; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-size: 14px; display: inline-flex; align-items: center; }
        .btn-logout { background: #e74c3c; color: white; }
        
        .posts-list { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
        .post-item { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #3498db; }
        .file-label { font-weight: bold; display: block; margin-bottom: 5px; color: #34495e; text-align: left; }
        .btn-edit-action { background: #f1c40f; color: white; margin-right: 5px; padding: 8px; border-radius: 5px; border:none; cursor:pointer;}
        .btn-delete-action { background: #e74c3c; color: white; padding: 8px; border-radius: 5px; border:none; cursor:pointer;}
        .status { text-align: center; color: #27ae60; font-weight: bold; display: none; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="login-section">
        <i class="fas fa-user-shield" style="font-size: 50px; color: #3498db; margin-bottom: 20px;"></i>
        <h2>Тизимга кириш</h2>
        <input type="email" id="adminEmail" placeholder="Email">
        <input type="password" id="adminPass" placeholder="Парол">
        <button class="btn-primary" id="loginBtn">КИРИШ</button>
    </div>

    <div id="admin-main-content">
        <div class="admin-profile">
            <div class="admin-avatar"><i class="fas fa-user-tie"></i></div>
            <div>
                <h3 style="margin:0;">Зохиджон Носирович</h3>
                <small id="userEmailStatus">Администратор</small>
            </div>
        </div>

        <div class="header-area">
            <h2 id="form-title"><i class="fas fa-plus-circle"></i> Янги мақола</h2>
            <div>
                <a class='btn-home' href='index.html'><i class="fas fa-home"></i> Асосий саҳифа</a>
                <button class="btn-logout" id="logoutBtn">Чиқиш</button>
            </div>
        </div>

        <div class="notice-box">
            <label class="file-label"><i class="fas fa-bullhorn"></i> Асосий саҳифа учун тезкор хабар:</label>
            <input type="text" id="quickNotice" placeholder="Масалан: Бугун сайтда техник ишлар олиб борилади...">
            <button class="btn-notice" id="sendNoticeBtn">ЭЪЛОННИ ЮБОРИШ</button>
        </div>

        <input type="hidden" id="edit-id">
        
        <label class="file-label">Бўлим:</label>
        <select id="category">
            <option value="home">Асосий сахифа</option>
            <option value="news">Янгиликлар</option>
            <option value="hlp">Маслаҳатлар</option>
            <option value="med">Табобат</option>
            <option value="cock">Ошхона</option>
            <option value="yumor">Ҳангомалар</option>
            <option value="stories">Ҳикоялар</option>
        </select>

        <input type="text" id="title" placeholder="Сарлавҳа">
        
        <label class="file-label">Расм линки (Интернетдан):</label>
        <input type="text" id="imageUrl" placeholder="Намуна: https://sayt.uz/rasm.jpg">

        <textarea id="content" rows="6" placeholder="Мақола матни..."></textarea>
        <input type="text" id="video" placeholder="Видео линк (Iframe)">

        <button id="publishBtn" class="btn-primary">НАШР ҚИЛИШ</button>
        <p id="statusMsg" class="status">✅ Муваффақиятли бажарилди!</p>

        <div class="posts-list">
            <h3><i class="fas fa-tasks"></i> Мақолаларни бошқариш</h3>
            <div id="postsContainer">Юкланмоқда...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
            authDomain: "universal-portal-108b7.firebaseapp.com",
            databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "universal-portal-108b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // КИРИШ
        document.getElementById('loginBtn').onclick = () => {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            if(!email || !pass) return alert("Маълумотни тўлдиринг");
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Хато: " + err.message));
        };

        // ЧИҚИШ
        document.getElementById('logoutBtn').onclick = () => {
            signOut(auth).then(() => location.reload());
        };

        // ТЕЗКОР ЭЪЛОН ЮБОРИШ
        document.getElementById('sendNoticeBtn').onclick = async () => {
            const txt = document.getElementById('quickNotice').value;
            if(!txt) return alert("Эълон матнини ёзинг!");
            try {
                await set(ref(db, 'site_notice'), { text: txt });
                alert("Эълон асосий саҳифага чиқарилди!");
            } catch(e) { alert(e.message); }
        };

        // ҲОЛАТНИ ТЕКШИРИШ
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-main-content').style.display = 'block';
                document.getElementById('userEmailStatus').innerText = user.email;
                loadPosts();
            }
        });

        // НАШР ҚИЛИШ
        document.getElementById('publishBtn').onclick = async () => {
            const btn = document.getElementById('publishBtn');
            const editId = document.getElementById('edit-id').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const img = document.getElementById('imageUrl').value;

            if (!title || !content) { alert("Сарлавҳа ва матнни тўлдиринг!"); return; }

            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Юборилмоқда...";

            try {
                const postData = {
                    title: title,
                    content: content,
                    category: document.getElementById('category').value,
                    video: document.getElementById('video').value || "",
                    image: img || "",
                    time: new Date().toLocaleString('uz-UZ')
                };

                if (editId) {
                    await update(ref(db, 'all_posts/' + editId), postData);
                    alert("Мақола янгиланди!");
                } else {
                    await push(ref(db, 'all_posts'), postData);
                    alert("Мақола нашр қилинди!");
                }
                location.reload();
            } catch (err) {
                alert("Хатолик: " + err.message);
                btn.disabled = false;
                btn.innerHTML = "НАШР ҚИЛИШ";
            }
        };

        function loadPosts() {
            onValue(ref(db, 'all_posts'), (snapshot) => {
                const container = document.getElementById('postsContainer');
                container.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.keys(data).reverse().forEach(id => {
                        const post = data[id];
                        const div = document.createElement('div');
                        div.className = 'post-item';
                        div.innerHTML = `
                            <div><b>${post.title}</b><br><small>${post.category}</small></div>
                            <div>
                                <button class="btn-edit-action" data-id="${id}"><i class="fas fa-edit"></i></button>
                                <button class="btn-delete-action" data-id="${id}"><i class="fas fa-trash"></i></button>
                            </div>`;
                        container.appendChild(div);
                    });
                    document.querySelectorAll('.btn-edit-action').forEach(btn => {
                        btn.onclick = () => editPost(btn.getAttribute('data-id'));
                    });
                    document.querySelectorAll('.btn-delete-action').forEach(btn => {
                        btn.onclick = () => deletePost(btn.getAttribute('data-id'));
                    });
                }
            });
        }

        async function deletePost(id) { if (confirm("Ўчирилсинми?")) await remove(ref(db, 'all_posts/' + id)); }

        function editPost(id) {
            onValue(ref(db, 'all_posts/' + id), (snapshot) => {
                const post = snapshot.val();
                if (post) {
                    document.getElementById('edit-id').value = id;
                    document.getElementById('title').value = post.title;
                    document.getElementById('content').value = post.content;
                    document.getElementById('category').value = post.category;
                    document.getElementById('imageUrl').value = post.image || "";
                    document.getElementById('video').value = post.video || "";
                    document.getElementById('form-title').innerHTML = "<i class='fas fa-sync'></i> Мақолани таҳрирлаш";
                    document.getElementById('publishBtn').innerText = "ЎЗГАРИШНИ САҚЛАШ";
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }, { onlyOnce: true });
        }
    </script>
</body>
</html>
