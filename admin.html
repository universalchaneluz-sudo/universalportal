<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Portal - Контрол Панел</title>
    <!-- Иконкалар -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* АСОСИЙ СТИЛЛАР */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #eef2f3; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            transition: 0.3s;
        }
        #login-section { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 350px; 
            text-align: center; 
        }
        #admin-main-content { 
            background: white; 
            width: 95%; 
            max-width: 700px; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            margin: 20px; 
            display: none; 
            box-sizing: border-box;
        }
        .header-area { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            border-bottom: 2px solid #f4f4f4; 
            padding-bottom: 15px; 
        }
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none;
        }
        .file-label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #3498db; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-weight: bold; 
        }
        button:hover { background: #2980b9; }
        .logout-btn { background: #e74c3c; padding: 10px 20px; width: auto; font-size: 14px; }
        .status { text-align: center; color: #27ae60; font-weight: bold; display: none; margin-top: 15px; }

        @media (max-width: 768px) {
            body { align-items: flex-start; padding-top: 20px; }
            #admin-main-content { padding: 20px; margin: 10px; }
            .header-area { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- 1. КИРИШ ОЙНАСИ -->
    <div id="login-section">
        <i class="fas fa-user-shield" style="font-size: 50px; color: #3498db; margin-bottom: 20px;"></i>
        <h2>Тизимга кириш</h2>
        <input type="email" id="adminEmail" placeholder="Email (почта)">
        <input type="password" id="adminPass" placeholder="Парол">
        <button onclick="login()">КИРИШ <i class="fas fa-sign-in-alt"></i></button>
    </div>

    <!-- 2. АСОСИЙ БОШҚАРУВ ПАНЕЛИ -->
    <div id="admin-main-content">
        <div class="header-area">
            <h2 style="margin:0;"><i class="fas fa-edit"></i> Янги мақола</h2>
            <button class="logout-btn" onclick="logout()">Чиқиш <i class="fas fa-sign-out-alt"></i></button>
        </div>
        
        <label><b>Саҳифани танланг:</b></label>
        <select id="category">
             <option value="news">Асосий сахифа(index.html)</option>
            <option value="news">Янгиликлар (news.html)</option>
            <option value="hlp">Маслаҳатлар (hlp.html)</option>
            <option value="med">Табобат (med.html)</option>
            <option value="cock">Ошхона (cock.html)</option>
            <option value="yumor">Ҳангомалар (yumor.html)</option>
            <option value="stories">Хикоялар (stories.html)</option>
        </select>

        <input type="text" id="title" placeholder="Мақола сарлавҳаси...">
        
        <label class="file-label">Расм танлаш (Компьютердан):</label>
        <input type="file" id="imageFile" accept="image/*">
        
        <label class="file-label">MP3 файл танлаш (Компьютердан):</label>
        <input type="file" id="audioFile" accept="audio/mpeg">

        <textarea id="content" rows="8" placeholder="Мақола матнини шу ерга ёзинг..."></textarea>
        <input type="text" id="video" placeholder='Видео код (Iframe код ёки линк)'>

        <button id="publishBtn" onclick="publishPost()">НАШР ҚИЛИШ <i class="fas fa-paper-plane"></i></button>
        <p id="statusMsg" class="status">✅ Муваффақиятли юборилди!</p>
    </div>

    <!-- FIREBASE МОДУЛЛАРИ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref as dbRef, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as stRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // Конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
            authDomain: "universal-portal-108b7.firebaseapp.com",
            databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "universal-portal-108b7",
            storageBucket: "universal-portal-108b7.firebasestorage.app",
            messagingSenderId: "183555008981",
            appId: "1:183555008981:web:b38e59baef1d6861b6b55c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // Кириш
        window.login = function() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            if(!email || !pass) { alert("Маълумотларни тўлдиринг!"); return; }
            signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Хато: " + err.message));
        };

        // Чиқиш
        window.logout = function() {
            signOut(auth).then(() => { location.reload(); });
        };

        // Ҳолатни текшириш
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-main-content').style.display = 'block';
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('admin-main-content').style.display = 'none';
            }
        });

        // Нашр қилиш ва файл юклаш
        window.publishPost = async function() {
            const btn = document.getElementById('publishBtn');
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const category = document.getElementById('category').value;
            const video = document.getElementById('video').value;
            
            const imageFile = document.getElementById('imageFile').files[0];
            const audioFile = document.getElementById('audioFile').files[0];

            if(!title || !content) {
                alert("Илтимос, сарлавҳа ва матнни тўлдиринг!");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Юкланмоқда...";

            try {
                let imageUrl = "";
                let audioUrl = "";

                // 1. Расмни Firebase Storage га юклаш
                if (imageFile) {
                    const imgRef = stRef(storage, 'images/' + Date.now() + "_" + imageFile.name);
                    await uploadBytes(imgRef, imageFile);
                    imageUrl = await getDownloadURL(imgRef);
                }

                // 2. Аудиони Firebase Storage га юклаш
                if (audioFile) {
                    const audRef = stRef(storage, 'audio/' + Date.now() + "_" + audioFile.name);
                    await uploadBytes(audRef, audioFile);
                    audioUrl = await getDownloadURL(audRef);
                }

                // 3. Маълумотларни базага ёзиш
                const postData = {
                    category: category,
                    title: title,
                    image: imageUrl,
                    audio: audioUrl,
                    content: content,
                    video: video,
                    time: new Date().toLocaleString('uz-UZ')
                };

                const newPostRef = push(dbRef(db, 'all_posts'));
                await set(newPostRef, postData);

                document.getElementById('statusMsg').style.display = 'block';
                setTimeout(() => { location.reload(); }, 1500);

            } catch (error) {
                alert("Хатолик юз берди: " + error.message);
                btn.disabled = false;
                btn.innerHTML = "НАШР ҚИЛИШ";
            }
        };
    </script>
</body>
</html>
