<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел - Universal Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; }
        #login-section { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        
        #admin-main-content { display: none; max-width: 900px; margin: 30px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .profile-header { background: #3498db; color: white; padding: 20px; border-radius: 15px; display: flex; align-items: center; margin-bottom: 30px; }
        .avatar { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-right: 20px; border: 2px solid white; }
        
        .notice-section, .ad-section { background: #fff4e5; border: 2px dashed #ff9800; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .ad-section { background: #e8f5e9; border-color: #4caf50; }

        input, textarea, select { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus, textarea:focus { border-color: #3498db; }
        
        button { border: none; cursor: pointer; font-weight: bold; border-radius: 12px; transition: 0.3s; }
        .btn-main { width: 100%; background: #3498db; color: white; padding: 15px; font-size: 18px; margin-top: 10px; }
        .btn-main:hover { background: #2980b9; }
        .btn-update { background: #2ecc71 !important; } /* Таҳрирлаш вақтида яшил бўлади */

        .btn-notice { background: #ff9800; color: white; padding: 10px 20px; }
        .btn-ad { background: #4caf50; color: white; padding: 10px 20px; }
        
        .post-item { background: #fcfcfc; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .post-actions { display: flex; gap: 5px; }
        
        .btn-top { background: #2ecc71; color: white; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-size: 14px; display: inline-block; margin-right: 5px; }
        .btn-delete { background: #e74c3c; color: white; padding: 8px 12px; font-size: 13px; }
        .btn-edit { background: #f1c40f; color: white; padding: 8px 12px; font-size: 13px; }
        
        h3 { border-left: 5px solid #3498db; padding-left: 10px; color: #2c3e50; }
        #cancelEdit { color: red; cursor: pointer; display: none; font-size: 14px; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-card">
            <i class="fas fa-shield-alt" style="font-size: 60px; color: #3498db; margin-bottom: 20px;"></i>
            <h2>Админ Кириш</h2>
            <input type="email" id="email" placeholder="Электрон почта">
            <input type="password" id="pass" placeholder="Парол">
            <button class="btn-main" id="loginBtn">КИРИШ</button>
            <p><a href="index.html" style="color: #666; text-decoration: none; font-size: 14px; margin-top: 10px; display: block;">Асосий саҳифага қайтиш</a></p>
        </div>
    </div>

    <div id="admin-main-content">
        <div class="profile-header">
            <div class="avatar"><i class="fas fa-user-tie"></i></div>
            <div>
                <h2 style="margin:0">Зохиджон Носирович</h2>
                <small>Бош Администратор | Universal Portal</small>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <a href="index.html" class="btn-top"><i class="fas fa-home"></i> Саҳифага қайтиш</a>
            <button id="logoutBtn" class="btn-top" style="background:#e74c3c"><i class="fas fa-sign-out-alt"></i> Чиқиш</button>
        </div>

        <div class="notice-section">
            <label><b><i class="fas fa-bullhorn"></i> Тезкор эълон (Матнли):</b></label>
            <div style="display:flex; gap:10px; margin-top:10px">
                <input type="text" id="qNotice" style="margin:0" placeholder="Муҳим хабарни ёзинг...">
                <button class="btn-notice" id="sendNBtn">САҚЛАШ</button>
                <button class="btn-notice" style="background:#666" id="delNBtn">ЎЧИРИШ</button>
            </div>
        </div>

        <div class="ad-section">
            <label><b><i class="fas fa-ad"></i> Реклама ва Эълонлар блоки (Расмли):</b></label>
            <input type="text" id="adImg" placeholder="Реклама расми (URL)" style="margin-top:10px">
            <input type="text" id="adLink" placeholder="Реклама линки (https://...)">
            <div style="display:flex; gap:10px;">
                <button class="btn-ad" id="saveAdBtn">РЕКЛАМАНИ ЖОЙЛАШ</button>
                <button class="btn-ad" style="background:#666" id="delAdBtn">ЎЧИРИШ</button>
            </div>
        </div>

        <h3 id="formTitle"><i class="fas fa-plus-circle"></i> Янги контент қўшиш <span id="cancelEdit" onclick="resetForm()">[Бекор қилиш]</span></h3>
        <select id="cat">
            <option value="news">Янгиликлар</option>
            <option value="med">Табобат</option>
            <option value="cinema">Кинотеатр (Кинолар)</option>
            <option value="clips">Мусиқий клиплар</option>
            <option value="stories">Ҳикоялар</option>
            <option value="yumor">Ҳангомалар</option>
            <option value="cook">Кулинария</option>
        </select>
        <input type="text" id="title" placeholder="Сарлавҳа">
        <input type="text" id="img" placeholder="Асосий расм URL">
        <textarea id="videoIframe" rows="3" placeholder="Видео Iframe коди"></textarea>
        <textarea id="txt" rows="6" placeholder="Батафсил матн ёки таъриф..."></textarea>
        <button class="btn-main" id="pubBtn">НАШР ҚИЛИШ</button>

        <div style="margin-top:40px">
            <h3><i class="fas fa-list"></i> Барча контентлар рўйхати</h3>
            <div id="pContainer">Юкланмоқда...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCO079n6tlKKTXi1LjtSB1t0ddsxDMQUW4",
            authDomain: "universal-portal-108b7.firebaseapp.com",
            databaseURL: "https://universal-portal-108b7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "universal-portal-108b7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let editId = null; // Таҳрирланаётган мақола ID си

        // Login
        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert("Киришда хатолик!"));
        };

        onAuthStateChanged(auth, u => {
            if(u) {
                document.getElementById('login-section').style.display='none';
                document.getElementById('admin-main-content').style.display='block';
                loadPosts();
            } else {
                document.getElementById('login-section').style.display='flex';
                document.getElementById('admin-main-content').style.display='none';
            }
        });

        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // Нашр қилиш ёки Янгилаш
        document.getElementById('pubBtn').onclick = async () => {
            const data = {
                title: title.value,
                content: txt.value,
                category: cat.value,
                image: img.value || "https://via.placeholder.com/400x200",
                video: videoIframe.value,
                time: editId ? document.getElementById('pubBtn').dataset.time : new Date().toLocaleString('uz-UZ')
            };

            if(!title.value) return alert("Сарлавҳа киритинг!");

            if(editId) {
                // Таҳрирлаш (Update)
                await update(ref(db, 'all_posts/' + editId), data);
                alert("Маълумот янгиланди!");
                resetForm();
            } else {
                // Янги қўшиш (Push)
                await push(ref(db, 'all_posts'), data);
                alert("Муваффақиятли нашр этилди!");
                resetForm();
            }
        };

        // Рўйхатни юклаш
        function loadPosts() {
            onValue(ref(db, 'all_posts'), s => {
                const pContainer = document.getElementById('pContainer');
                pContainer.innerHTML = "";
                const d = s.val();
                if(d) {
                    Object.keys(d).reverse().forEach(id => {
                        const div = document.createElement('div');
                        div.className = 'post-item';
                        div.innerHTML = `
                            <div>
                                <strong>${d[id].title}</strong> <br>
                                <small style="color:#3498db">${d[id].category} | ${d[id].time}</small>
                            </div>
                            <div class="post-actions">
                                <button class="btn-edit" onclick="editPost('${id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn-delete" onclick="deletePost('${id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        `;
                        pContainer.appendChild(div);
                    });
                }
            });
        }

        // Таҳрирлаш учун формага олиб келиш
        window.editPost = (id) => {
            onValue(ref(db, 'all_posts/' + id), s => {
                const data = s.val();
                if(data) {
                    editId = id;
                    title.value = data.title;
                    txt.value = data.content;
                    cat.value = data.category;
                    img.value = data.image;
                    videoIframe.value = data.video || "";
                    
                    // Тугма кўринишини ўзгартириш
                    const btn = document.getElementById('pubBtn');
                    btn.innerText = "ЎЗГАРТИРИШНИ САҚЛАШ";
                    btn.classList.add('btn-update');
                    btn.dataset.time = data.time;
                    
                    document.getElementById('formTitle').firstChild.textContent = " Контентни таҳрирлаш ";
                    document.getElementById('cancelEdit').style.display = "inline";
                    window.scrollTo(0, 200); // Формага чиқариш
                }
            }, { onlyOnce: true });
        };

        // Формани тозалаш
        window.resetForm = () => {
            editId = null;
            title.value = ""; txt.value = ""; img.value = ""; videoIframe.value = "";
            const btn = document.getElementById('pubBtn');
            btn.innerText = "НАШР ҚИЛИШ";
            btn.classList.remove('btn-update');
            document.getElementById('formTitle').firstChild.textContent = " Янги контент қўшиш ";
            document.getElementById('cancelEdit').style.display = "none";
        };

        window.deletePost = (id) => {
            if(confirm("Ростдан ўчирмоқчимисиз?")) remove(ref(db, 'all_posts/'+id));
        };

        // Тезкор эълон ва Реклама учун функциялар аввалгидек қолади...
        document.getElementById('sendNBtn').onclick = () => set(ref(db, 'site_notice'), { text: qNotice.value });
        document.getElementById('delNBtn').onclick = () => { set(ref(db, 'site_notice'), { text: "" }); qNotice.value = ""; };
        document.getElementById('saveAdBtn').onclick = () => set(ref(db, 'ads_banner'), { image: adImg.value, link: adLink.value });
        document.getElementById('delAdBtn').onclick = () => { set(ref(db, 'ads_banner'), null); adImg.value = ""; adLink.value = ""; };
    </script>
</body>
</html>
