<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фойдали маслаҳатлар - Universal Portal</title>
    
    <!-- Иконкалар учун -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 1. УМУМИЙ ДИЗАЙН (Асосий созламалар) */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #34495e;
            overflow-x: hidden; /* Мобилда ёнга сурилишни олдини олади */
        }

        /* 2. ШАПКА ВА ЛОГО */
        header {
            background: white;
            padding: 15px;
            text-align: center;
            border-bottom: 4px solid #27ae60;
        }
        .logo {
            font-size: 26px;
            font-weight: bold;
            text-decoration: none;
            color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .logo i { color: #27ae60; }

        /* 3. НАВИГАЦИЯ (Меню) */
        nav {
            background: #2c3e50;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
        }
        nav a {
            color: white;
            padding: 15px 20px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            font-size: 15px;
        }
        nav a:hover, nav a.active {
            background: #1a252f;
            color: #27ae60;
        }

        /* 4. КОНТЕЙНЕР */
        .container {
            max-width: 1100px;
            margin: 30px auto;
            display: flex;
            gap: 25px;
            padding: 0 15px;
        }

        .main-content { flex: 7; }
        .sidebar { flex: 3; }

        /* 5. МАСЛАҲАТ КАРТОЧКАСИ */
        .post-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
        }
        .post-card img { width: 100%; height: 300px; object-fit: cover; }
        .post-info { padding: 25px; }
        .post-info h2 { 
            margin: 0 0 15px; 
            color: #2c3e50; 
            font-size: 22px;
            border-left: 5px solid #27ae60;
            padding-left: 15px;
            line-height: 1.3;
        }
        .post-info p { line-height: 1.8; font-size: 16px; color: #555; }

        .video-box { margin-top: 20px; border-radius: 10px; overflow: hidden; }
        .video-box iframe { width: 100%; height: 350px; border: none; }

        /* 6. SIDEBAR ВИДЖЕТ */
        .widget {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 80px;
        }
        .widget h3 {
            margin-top: 0;
            font-size: 18px;
            color: #27ae60;
            border-bottom: 2px solid #f1f1f1;
            padding-bottom: 10px;
        }
        .link-list { list-style: none; padding: 0; }
        .link-list li { padding: 12px 0; border-bottom: 1px solid #f9f9f9; }
        .link-list a { text-decoration: none; color: #444; font-size: 15px; transition: 0.2s; display: block; }
        .link-list a:hover { color: #27ae60; padding-left: 5px; }

        /* 📱 МОБИЛ АДАПТАЦИЯ (Фақат битта бўлиши керак ва энг пастда) */
        @media (max-width: 768px) {
            .container { 
                flex-direction: column; 
                margin: 15px auto; 
            }
            
            .main-content, .sidebar { 
                width: 100% !important; 
                flex: none; 
            }

            header { padding: 10px; }
            .logo { font-size: 22px; }

            nav { flex-wrap: wrap; }
            nav a {
                flex: 1 1 45%; /* Битта қаторда 2 тадан меню */
                padding: 10px 5px;
                font-size: 13px;
                text-align: center;
                border: 1px solid #34495e;
            }

            .post-card img { height: 200px; }
            .post-info { padding: 15px; }
            .post-info h2 { font-size: 18px; }
            
            .widget { position: static; margin-top: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <i class="fas fa-lightbulb"></i> ФОЙДАЛИ МАСЛАҲАТЛАР
        </a>
    </header>

    <nav>
        <a href="index.html">Асосий</a>
        <a href="hlp.html" class="active">Маслаҳатлар</a>
        <a href="cock.html">Ошхона</a>
        <a href="med.html">Табобат</a>
        <a href="yumor.html">Ҳангомалар</a>
        <a href="news.html">Янгиликлар</a>
    </nav>

    <div class="container">
        <!-- Маслаҳатлар лентаси -->
        <main class="main-content" id="post-display-area">
            <!-- Мақолалар Firebase ва bridge.js орқали шу ерга келади -->
        </main>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="widget">
                <h3><i class="fas fa-list-ul"></i> Бошқа маслаҳатлар</h3>
                <ul class="link-list" id="sidebar-links">
                    <!-- Сарлавҳалар автоматик пайдо бўлади -->
                </ul>
            </div>
        </aside>
    </div>

    <!-- КЎПРИК СКРИПТИ -->
    <script type="module" src="bridge.js"></script>

</body>
</html>
