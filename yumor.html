<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ҳангомалар ва Латифалар - 🤣🤣🤣🤣</title>
    
    <!-- Иконкалар учун -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 1. УМУМИЙ ДИЗАЙН (Қувноқ ва иссиқ ранглар) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Тизимли шрифт яхшироқ ишлайди */
            margin: 0;
            padding: 0;
            background-color: #fff9e6; /* Енгил сариқ фонда */
            color: #444;
            overflow-x: hidden;
        }

        /* 2. ШАПКА ВА СМАЙЛИКЛАР */
        header {
            background: #f1c40f;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .humor-logo {
            font-size: 30px;
            font-weight: bold;
            color: #2c3e50;
            text-decoration: none;
            display: block;
        }
        .emoji-bar {
            font-size: 35px;
            margin-top: 10px;
            display: block;
        }

        /* 3. НАВИГАЦИЯ (МЕНЮ) */
        nav {
            background: #e67e22;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        nav a {
            color: white;
            padding: 15px 20px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        nav a:hover, nav a.active {
            background: #d35400;
        }

        /* 4. АСОСИЙ ҚИСМ */
        .main-wrapper {
            max-width: 1000px;
            margin: 30px auto;
            display: flex;
            gap: 25px;
            padding: 0 15px;
        }

        .humor-posts { flex: 7; }
        .sidebar { flex: 3; }

        /* 5. ҲАНГОМА КАРТОЧКАСИ */
        .post-card {
            background: white;
            border-radius: 20px;
            border: 3px solid #f1c40f;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        }
        .post-card img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
        }
        .post-content { padding: 25px; }
        .post-content h2 {
            color: #d35400;
            margin-top: 0;
            font-size: 24px;
        }
        .post-content p {
            font-size: 18px;
            line-height: 1.6;
            white-space: pre-line; /* Матндаги қатор ташлашларни сақлайди */
        }

        /* Видео учун */
        .video-container {
            background: #000;
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
        }
        .video-container iframe { width: 100%; height: 350px; border: none; }

        /* 6. SIDEBAR ВИДЖЕТ */
        .joke-list-widget {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 80px;
        }
        .joke-list-widget h3 {
            color: #c0392b;
            text-align: center;
            border-bottom: 2px dashed #f1c40f;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .link-list { list-style: none; padding: 0; }
        .link-list li { padding: 12px 0; border-bottom: 1px solid #eee; }
        .link-list a { text-decoration: none; color: #555; font-size: 16px; font-weight: 500; display: block; }
        .link-list a:hover { color: #e67e22; padding-left: 5px; transition: 0.2s; }

        /* 📱 МОБИЛ ВЕРСИЯ (ЭНГ ПАСТДА) */
        @media (max-width: 768px) {
            .main-wrapper { 
                flex-direction: column; 
                margin-top: 15px;
            }

            .humor-posts, .sidebar { 
                width: 100% !important; 
                flex: none; 
            }

            .emoji-bar { font-size: 28px; }
            .humor-logo { font-size: 24px; }

            nav { flex-wrap: wrap; }
            nav a {
                flex: 1 1 45%;
                text-align: center;
                font-size: 14px;
                padding: 10px 5px;
                border: 0.5px solid #d35400;
            }

            .post-content h2 { font-size: 20px; }
            .post-content p { font-size: 16px; }
            
            .joke-list-widget { position: static; margin-top: 20px; }
        }
    </style>
</head>
<body>

    <!-- Шапка -->
    <header>
        <a href="index.html" class="humor-logo">ҲАНГОМАЛАР ВА ЛАТИФАЛАР</a>
        <span class="emoji-bar">🤣🤣🤣🤣</span>
    </header>

    <!-- Навигация -->
    <nav>
        <a href="index.html">Асосий</a>
        <a href="cock.html">Ошхона</a>
        <a href="med.html">Табобат</a>
        <a href="yumor.html" class="active">Ҳангомалар</a>
        <a href="news.html">Янгиликлар</a>
    </nav>

    <!-- Контент -->
    <div class="main-wrapper">
        
        <!-- Латифалар лентаси -->
        <main class="humor-posts" id="post-display-area">
            <!-- Хабарлар bridge.js орқали шу ерга тушади -->
        </main>

        <!-- Ўнг томон -->
        <aside class="sidebar">
            <div class="joke-list-widget">
                <h3><i class="fas fa-laugh-squint"></i> Кулги соати</h3>
                <ul class="link-list" id="sidebar-links">
                    <!-- Линклар автоматик чиқади -->
                </ul>
            </div>
        </aside>
        
    </div>

    <!-- Кўприк скрипти (Фақат битта бўлиши шарт) -->
    <script type="module" src="bridge.js"></script>

</body>
</html>
